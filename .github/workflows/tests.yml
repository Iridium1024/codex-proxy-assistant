name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -r requirements-build.txt
      - name: Run PowerShell core tests
        shell: powershell
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\tests\test_core.ps1
      - name: Run Python and GUI tests
        shell: powershell
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m unittest discover -s .\tests -p 'test_*.py' -v
